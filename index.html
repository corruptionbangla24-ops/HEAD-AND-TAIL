<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COIN FLIP - HEAD & TAIL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (অতিরিক্ত ব্যালেন্স বক্স চিরতরে গায়েব ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">COIN FLIP</div>
            <div class="game">HEAD & TAIL MASTER</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        </div>
    </div>


    <!-- 🪙 থ্রিডি নিয়ন কয়েন ফ্লিপিং জোন ভাই ভাই -->
    <div class="coin-zone">
        <div class="coin-window-frame">
            <div class="coin-container" id="main-coin">
                <div class="coin-face head-face" id="coin-front">HEAD</div>
                <div class="coin-face tail-face" id="coin-back">TAIL</div>
            </div>
        </div>
    </div>

    <!-- 🎰 বাজি ধরার প্রধান ২টি নিয়ন কালার বেটিং বোর্ড ঘর (১.৯৫ ওডস কড়া লক ভাই ভাই) -->
    <div class="betting-board">
        <button class="bet-board-btn head-win-btn" id="board-HEAD" onclick="selectBetOption('HEAD')">
            <span class="board-label">HEAD 🪙</span>
            <span class="board-odds">১.৯৫ গুণ লাভ</span>
        </button>
        <button class="bet-board-btn tail-win-btn" id="board-TAIL" onclick="selectBetOption('TAIL')">
            <span class="board-label">TAIL 🪙</span>
            <span class="board-odds">১.৯৫ গুণ লাভ</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">আপনার টার্গেট সিলেক্ট করে কয়েন ফ্লিপ করুন ভাই ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও FLIP বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleCoinFlipShake()">FLIP</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedOption = null; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // 🚀 [মাস্টার সিঙ্ক ফিক্সড]: ব্যাকএন্ডের পাঠানো নিখুঁত রেজাল্ট ডাইরেক্ট অবজেক্ট রিডিং ভাই ভাই!
        function showFinalResult(data) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");
            const coinNode = document.getElementById("main-coin");

            // কয়েন ফিজিক্স ফাইনাল পজিশন সেট ভাই ভাই
            coinNode.className = "coin-container";
            if (data.result === "HEAD") {
                coinNode.style.transform = "rotateY(0deg)";
            } else {
                coinNode.style.transform = "rotateY(180deg)";
            }

            if (data.status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! কয়েন পড়েছে: ${data.result} [৳${data.winAmount}]`;
            } else {
                playAudio('click1'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ কয়েন পড়েছে: ${data.result}। এই রাউন্ডে ভাগ্য সহায় হয়নি ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopCoinState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleCoinFlipShake();
                }, 2500);
            }
        }

        // 🧠 [কয়েন ফ্লিপ থ্রিডি মোশন ইন্টারসেপ্টর ইঞ্জিন ভাই ভাই]
        async function handleCoinFlipShake() {
            if (isSpinning) return;
            if (!selectedOption) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি ঘর (HEAD বা TAIL) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🪙 কয়েনটি বাতাসে অন ফায়ার ঘুরছে...";

            playAudio('click');
            playAudio('spin');

            // থ্রিডি কয়েন স্পিন ঘূর্ণন এনিমেশন পুশ ভাই ভাই
            const coinNode = document.getElementById("main-coin");
            coinNode.classList.add("coin-blur-spinning");

            try {
                const response = await fetch(`${SERVER_URL}/api/coin-flip`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedOption
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    setTimeout(() => {
                        coinNode.classList.remove("coin-blur-spinning");
                        showFinalResult(data);
                    }, 1500); // ১.৫ সেকেন্ড কিলার মোশন থ্রিল ভাই ভাই

                } else {
                    coinNode.classList.remove("coin-blur-spinning");
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopCoinState();
                }
            } catch (err) {
                coinNode.classList.remove("coin-blur-spinning");
                alert("⚠️ সেশন আউট! আবার FLIP বোতাম চাপুন ভাই ভাই।");
                stopCoinState();
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/coin-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag check"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function selectBetOption(option) {
            if (isSpinning) return;
            selectedOption = option;
            document.querySelectorAll(".bet-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            document.getElementById(`board-${option}`).classList.add("active-side-bet");
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet -= 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

                function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.click1.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleCoinFlipShake();
            playAudio('click');
        }

        function stopCoinState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            click1: new Audio('click1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
